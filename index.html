<!DOCTYPE html>
<html>

<head>
    <title>Billing System</title>

    <!-- PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>


    <style>
        body {
            font-family: Arial;
        }


        input[type="date"] {
            width: 100px;
            padding: 5px;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border: 2px solid black;
            padding: 6px;
            text-align: center;
        }

        input {
            width: 50px;
        }

        button {
            margin: 8px;
            padding: 8px 12px;
        }

        .delete-btn {
            background: rgb(149, 127, 127);
            color: white;
            border: none;
            padding: 5px 8px;
            border-radius: 5px;
            cursor: pointer;
        }

        .delete-btn:hover {
            opacity: 0.8;
        }

        /* 🧾 Professional PDF Style */

        .pdf-mode .delete-column {
            display: none !important;
        }

        .pdf-mode table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .pdf-mode th {
            border-bottom: 2px solid black;
            padding: 8px;
            background: #f2f2f2;
        }

        .pdf-mode td {
            border-bottom: 1px solid #999;
            /* light row lines */
            padding: 6px;
        }


        /* Title styling */
        .pdf-mode h2 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 10px;
            border-bottom: 2px solid black;
            padding-bottom: 5px;
        }

        /* Grand total highlight */
        .pdf-mode h3 {
            text-align: right;
            margin-top: 15px;
            font-size: 18px;
        }

        .pdf-mode input {
            border: none;
            background: transparent;
            text-align: center;
        }

        .pdf-mode table,
        .pdf-mode th,
        .pdf-mode td {
            border: 1px solid black;
        }

        /* 📱 Responsive */
        /* 📱 Mobile Improvement */
        @media (max-width: 600px) {

            .container {
                width: 100%;
                padding: 5px;
            }

            table {
                display: block;
                overflow-x: auto;
                /* 🔥 scroll table */
                white-space: nowrap;
            }

            th,
            td {
                font-size: 13px;
                padding: 6px;
            }

            input {
                width: 60px;
                padding: 5px;
            }

            input[type="date"] {
                width: 120px;
            }

            button {
                width: 90%;
                font-size: 14px;
                padding: 10px;
                border-radius: 6px;
                background-color: #2d89ef;
                color: white;
                border: none;
            }

            h2 {
                font-size: 18px;
            }

            h3 {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="container" id="billArea">

        <h2>BILL SHYAM TIFFIN CENTER</h2>

        <table id="billTable">
            <tr>
                <th>DATE</th>
                <th>B.F</th>
                <th>L.C</th>
                <th>D.N</th>
                <th class="delete-column">DELETE</th>
            </tr>
            <tr>
                <td><b>Total</b></td>
                <td id="bfTotal">0</td>
                <td id="lcTotal">0</td>
                <td id="dnTotal">0</td>
            </tr>
            <tr>
                <td><b>AMOUNT</b></td>
                <td id="abfTotal">0</td>
                <td id="alcTotal">0</td>
                <td id="adnTotal">0</td>
            </tr>

        </table>



        <h3 style="text-align:center;">
            Total-Amount : ₹ <span id="grandTotal">0</span>
        </h3>

    </div>


    <div style="text-align:center;">
        <button onclick="addRow()">Add Row</button>
        <button onclick="calculateTotal()">Calculate Total</button>
        <button onclick="downloadPDF()">Download PDF</button>

    </div>


    <script>
        function addRow() {
            let table = document.getElementById("billTable");

            // get all existing date inputs
            let dateInputs = table.querySelectorAll(".dateInput");
            let nextDate;

            if (dateInputs.length > 0) {
                let lastDateValue = dateInputs[dateInputs.length - 1].value;

                if (lastDateValue) {
                    let lastDate = new Date(lastDateValue);
                    lastDate.setDate(lastDate.getDate() + 1);

                    nextDate = lastDate.toISOString().split('T')[0];
                }
            }

            // if no previous date
            if (!nextDate) {
                nextDate = new Date().toISOString().split('T')[0];
            }

            // insert row before total row
            let row = table.insertRow(table.rows.length - 2);

            row.innerHTML = `
<td><input type="date" class="dateInput" value="${nextDate}"></td>

<td>
    <input type="number" class="bf" value="0"
    oninput="calculateTotal()">
</td>

<td>
    <input type="number" class="lc" value="0"
    oninput="calculateTotal()">
</td>

<td>
    <input type="number" class="dn" value="0"
    oninput="calculateTotal()">
</td>

<td class="delete-column">
    <button class="delete-btn"
    onclick="deleteRow(this)">
    ❌
    </button>
</td>
`;
        }
        function calculateTotal() {
            let bfs = document.querySelectorAll(".bf");
            let lcs = document.querySelectorAll(".lc");
            let dns = document.querySelectorAll(".dn");

            let bfTotal = 0, lcTotal = 0, dnTotal = 0;

            for (let i = 0; i < bfs.length; i++) {
                bfTotal += Number(bfs[i].value) || 0;
                lcTotal += Number(lcs[i].value) || 0;
                dnTotal += Number(dns[i].value) || 0;
            }

            document.getElementById("bfTotal").innerText = bfTotal;
            document.getElementById("lcTotal").innerText = lcTotal;
            document.getElementById("dnTotal").innerText = dnTotal;

            let bfAmount = bfTotal * 30;
            let lcAmount = lcTotal * 70;
            let dnAmount = dnTotal * 70;

            document.getElementById("abfTotal").innerText =
                `${bfTotal} × 30  × 1  = ₹${bfAmount}`;

            document.getElementById("alcTotal").innerText =
                `${lcTotal} × 70 × 1 = ₹${lcAmount}`;

            document.getElementById("adnTotal").innerText =
                `${dnTotal} × 70 × 1 = ₹${dnAmount}`;

            document.getElementById("grandTotal").innerText =
                bfAmount + lcAmount + dnAmount;


        }


        // delete button
        function deleteRow(button) {

            let row = button.parentNode.parentNode;

            row.remove();

            calculateTotal();
        }







        /* 📄 PDF Download */
        async function downloadPDF() {
            const { jsPDF } = window.jspdf;

            let bill = document.getElementById("billArea");
            bill.classList.add("pdf-mode");

            let pdf = new jsPDF('p', 'mm', 'a4');

            const rowsPerPage = 32;

            let allRows = Array.from(document.querySelectorAll("#billTable tr"));

            let header = allRows[0];

            let totalRows = allRows.slice(-2);

            let dataRows = allRows.slice(1, -2);

            let chunks = [];

            for (let i = 0; i < dataRows.length; i += rowsPerPage) {
                chunks.push(dataRows.slice(i, i + rowsPerPage));
            }

            for (let page = 0; page < chunks.length; page++) {

                let tempTable = document.createElement("table");
                tempTable.style.width = "100%";
                tempTable.style.borderCollapse = "collapse";

                tempTable.appendChild(header.cloneNode(true));

                chunks[page].forEach(row => {
                    tempTable.appendChild(row.cloneNode(true));
                });

                // last page → show totals
                if (page === chunks.length - 1) {
                    totalRows.forEach(row => {
                        tempTable.appendChild(row.cloneNode(true));
                    });
                }

                let tempDiv = document.createElement("div");

                tempDiv.innerHTML = `
            <h2 style="text-align:center;">
                BILL SHYAM TIFFIN CENTER
            </h2>
        `;

                tempDiv.appendChild(tempTable);

                if (page === chunks.length - 1) {
                    tempDiv.innerHTML += `
            <h3 style="text-align:center;">
                Total Amount : ₹ ${document.getElementById("grandTotal").innerText}
            </h3>
            `;
                }

                document.body.appendChild(tempDiv);

                const canvas = await html2canvas(tempDiv, {
                    scale: 4,
                    useCORS: true
                });

                const imgData = canvas.toDataURL("image/png");

                let pageWidth = pdf.internal.pageSize.getWidth();
                let imgWidth = pageWidth - 20;

                let imgHeight =
                    (canvas.height * imgWidth) / canvas.width;

                if (page > 0) pdf.addPage();

                pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);

                document.body.removeChild(tempDiv);
            }

            pdf.save("Shyam_Tiffin_Bill.pdf");

            bill.classList.remove("pdf-mode");
        }


    </script>

</body>

</html>
